name: Deploy to Linux Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # STEP 1: Upload code to the server's home directory
      - name: Copy files via SSH
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "."
          target: "/home/${{ secrets.SERVER_USER }}/beat-the-ai"

      # STEP 2: Build and Run using Podman
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            # Move to the uploaded directory
            cd /home/${{ secrets.SERVER_USER }}/beat-the-ai
            
            # Stop and cleanup existing container
            podman stop beat-the-ai || true
            podman rm beat-the-ai || true

            # Build the image from the CURRENT directory (.)
            podman build -t beat-the-ai .

            # Run the container
            podman run -d \
              --name beat-the-ai \
              -p 5001:5001 \
              --restart always \
              -e OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
              beat-the-ai